name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 第一步：现场编译 Linux 版本的二进制文件
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build Binary
        run: |
          # 如果你的仓库里没有 go.mod，自动初始化一个
          if [ ! -f go.mod ]; then
            go mod init myapp
          fi
          
          # 尝试整理依赖，忽略可能的网络报错继续执行
          go mod tidy || true
          
          # 核心：编译出 Linux 环境下的 amd64 格式可执行文件
          # 使用 -o myapp 确保输出文件名与 Dockerfile 里的 ADD 匹配
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o myapp .

      # 第二步：登录仓库
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 第三步：构建并推送镜像（此时 Dockerfile 会把上面编译好的 myapp 塞进去）
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest
